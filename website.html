<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Website Development - LUNA-INC</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modifikasi Layout Tambahan khusus Form Halaman Ini */
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
        }
        .project-samples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .sample-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
        }
        .sample-card h4 { color: #00f0ff; margin-bottom: 5px; font-size: 1rem; }
        .sample-card p { color: #a0a7b8; font-size: 0.8rem; }
        
        /* Form Styling */
        .form-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: #ffd700;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group input, .form-group textarea, .form-group input[type="file"] {
            width: 100%;
            background: rgba(4, 6, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .form-group input[type="file"] {
            padding: 8px;
            cursor: pointer;
            background: rgba(0, 240, 255, 0.02);
            border: 1px dashed rgba(0, 240, 255, 0.3);
        }
        .form-group input[type="file"]::file-selector-button {
            background: #00f0ff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: #04060f;
            font-weight: 600;
            margin-right: 10px;
            cursor: pointer;
        }
        .submit-btn {
            background: #00f0ff;
            color: #04060f;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.7);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda
        </a>

        <section class="hero-card" style="padding: 30px 20px; margin-bottom: 20px;">
            <div class="hero-logo" style="font-size: 2.5rem; color: #00f0ff;">
                <i class="fa-solid fa-code"></i>
            </div>
            <h1>Website Development</h1>
            <p>Portofolio Contoh & Pengajuan Project</p>
        </section>

        <h2 class="section-title" style="font-size: 1.1rem; text-align: left; margin-bottom: 10px;">Our Project Examples</h2>
        <div class="project-samples">
            <div class="sample-card">
                <h4>E-Commerce Platform</h4>
                <p>Sistem toko online terintegrasi payment gateway otomatis.</p>
            </div>
            <div class="sample-card">
                <h4>Company Profile</h4>
                <p>Website perusahaan premium dengan animasi interaktif & SEO tinggi.</p>
            </div>
        </div>

        <div class="form-container">
            <h3 style="color:#ffd700; font-family:'Montserrat'; margin-bottom: 20px; font-size: 1.1rem; text-align:center;">FORM PENGAJUAN PROYEK</h3>
            <form id="projectForm">
                <div class="form-group">
                    <label for="clientName">Nama Lengkap / Instansi</label>
                    <input type="text" id="clientName" placeholder="Contoh: Budi Santoso" required>
                </div>
                <div class="form-group">
                    <label for="projectType">Jenis Website</label>
                    <input type="text" id="projectType" placeholder="Contoh: E-Commerce, Landing Page, SaaS" required>
                </div>
                <div class="form-group">
                    <label for="projectDesc">Deskripsi Singkat Kebutuhan</label>
                    <textarea id="projectDesc" rows="4" placeholder="Jelaskan fitur-fitur website yang Anda inginkan..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="projectFile">Unggah Dokumen Pendukung (PDF / Gambar Brief)</label>
                    <input type="file" id="projectFile" accept=".pdf, image/*">
                </div>
                <button type="submit" class="submit-btn">KIRIM VIA WHATSAPP</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil data inputan user
            const name = document.getElementById('clientName').value;
            const type = document.getElementById('projectType').value;
            const desc = document.getElementById('projectDesc').value;
            const fileInput = document.getElementById('projectFile');
            
            // Cek jika ada file yang dipilih
            let fileName = "Tidak ada lampiran";
            if (fileInput.files.length > 0) {
                fileName = fileInput.files[0].name;
            }

            // Nomor WhatsApp tujuan & Susun template teks rapi menggunakan format markdown WA
            const waNumber = "6289677222133"; // Sesuaikan dengan nomor WA LUNA-INC
            let message = `*PENGAJUAN PROYEK WEBSITE DEVELOPMENT*\n\n`;
            message += `• *Nama Klien:* ${name}\n`;
            message += `• *Jenis Website:* ${type}\n`;
            message += `• *Kebutuhan:* ${desc}\n`;
            message += `• *Dokumen Terunggah:* _${fileName}_\n\n`;
            
            if(fileInput.files.length > 0) {
                message += `_(Halo Admin, saya telah memilih dokumen *${fileName}* pada form, mohon izinkan saya melampirkannya setelah pesan ini dikirim)._`;
            }

            // Encode pesan teks agar aman masuk url browser
            const encodedMessage = encodeURIComponent(message);
            
            // Alihkan halaman ke WhatsApp web/aplikasi secara instan
            window.location.href = `https://wa.me/${waNumber}?text=${encodedMessage}`;
        });
    </script>
</body>
</html>
